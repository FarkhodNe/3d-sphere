<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Particle Sphere</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            display: block;
            cursor: grab;
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        #ui-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            pointer-events: none;
        }

        .input-wrapper {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(100, 200, 255, 0.3);
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: rgba(150, 220, 255, 0.8);
            box-shadow: 0 0 40px rgba(150, 220, 255, 0.6);
        }

        input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            text-align: center;
            outline: none;
            width: 300px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .hint {
            margin-top: 10px;
            color: rgba(200, 230, 255, 0.5);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .controls-hint {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(200, 230, 255, 0.4);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            pointer-events: none;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div class="controls-hint">Right-click + Drag to Rotate • Type & Press Enter to Transform</div>

    <div id="canvas-container"></div>

    <div id="ui-container">
        <div class="input-wrapper">
            <input type="text" id="textInput" placeholder="TYPE HERE..." maxlength="12" autocomplete="off">
        </div>
        <div class="hint">Press Enter to Transform</div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // --- Configuration ---
        const PARTICLE_COUNT = 4000;
        const PARTICLE_SIZE = 0.18;
        const SPHERE_RADIUS = 12;
        const TEXT_SIZE = 8;
        const COLOR_BASE = new THREE.Color(0xddeeff);
        const COLOR_HIGHLIGHT = new THREE.Color(0xffffff);

        // --- Globals ---
        let scene, camera, renderer, composer;
        let particles, particlePositions, particleTargets, particleVelocities;
        let geometry, material;
        let mouse = new THREE.Vector2();
        let rotationVelocity = { x: 0, y: 0 };
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        
        const textCanvas = document.createElement('canvas');
        const textCtx = textCanvas.getContext('2d');
        textCanvas.width = 500;
        textCanvas.height = 200;

        init();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 40;

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.ReinhardToneMapping;
            container.appendChild(renderer.domElement);

            // Post Processing
            const renderScene = new RenderPass(scene, camera);
            const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.0, 0.5, 0.9);
            bloomPass.threshold = 0;
            bloomPass.strength = 2.0;
            bloomPass.radius = 0.6;

            composer = new EffectComposer(renderer);
            composer.addPass(renderScene);
            composer.addPass(bloomPass);

            // Particle System Setup
            geometry = new THREE.BufferGeometry();
            particlePositions = new Float32Array(PARTICLE_COUNT * 3);
            particleTargets = new Float32Array(PARTICLE_COUNT * 3);
            particleVelocities = new Float32Array(PARTICLE_COUNT * 3);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const spherePos = getSpherePoint();
                
                particlePositions[i3] = spherePos.x;
                particlePositions[i3 + 1] = spherePos.y;
                particlePositions[i3 + 2] = spherePos.z;

                particleTargets[i3] = spherePos.x;
                particleTargets[i3 + 1] = spherePos.y;
                particleTargets[i3 + 2] = spherePos.z;

                particleVelocities[i3] = (Math.random() - 0.5) * 0.05;
                particleVelocities[i3 + 1] = (Math.random() - 0.5) * 0.05;
                particleVelocities[i3 + 2] = (Math.random() - 0.5) * 0.05;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(particlePositions, 3));

            const sprite = getTexture();
            material = new THREE.PointsMaterial({
                size: PARTICLE_SIZE,
                map: sprite,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                color: COLOR_BASE
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            // Event Listeners
            window.addEventListener('resize', onWindowResize);
            
            // Right-click drag rotation
            container.addEventListener('mousedown', onMouseDown);
            container.addEventListener('mousemove', onMouseMove);
            container.addEventListener('mouseup', onMouseUp);
            container.addEventListener('mouseleave', onMouseUp);
            container.addEventListener('contextmenu', (e) => e.preventDefault());
            
            const input = document.getElementById('textInput');
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    transformToText(input.value);
                    input.blur();
                }
            });
        }

        function getTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 32;
            canvas.height = 32;
            const context = canvas.getContext('2d');
            const gradient = context.createRadialGradient(16, 16, 0, 16, 16, 16);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(220,240,255,0.9)');
            gradient.addColorStop(0.5, 'rgba(180,220,255,0.4)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            context.fillStyle = gradient;
            context.fillRect(0, 0, 32, 32);
            const texture = new THREE.Texture(canvas);
            texture.needsUpdate = true;
            return texture;
        }

        function getSpherePoint() {
            const phi = Math.acos(-1 + (2 * Math.random()));
            const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
            
            const r = SPHERE_RADIUS;
            return {
                x: r * Math.cos(theta) * Math.sin(phi),
                y: r * Math.sin(theta) * Math.sin(phi),
                z: r * Math.cos(phi)
            };
        }

        function transformToText(text) {
            if (!text) {
                resetToSphere();
                return;
            }

            textCtx.clearRect(0, 0, textCanvas.width, textCanvas.height);
            textCtx.fillStyle = '#ffffff';
            textCtx.font = 'bold 100px Arial';
            textCtx.textAlign = 'center';
            textCtx.textBaseline = 'middle';
            textCtx.fillText(text, textCanvas.width / 2, textCanvas.height / 2);

            const imageData = textCtx.getImageData(0, 0, textCanvas.width, textCanvas.height);
            const data = imageData.data;
            const textCoords = [];

            const step = 3; // Reduced from 4 for denser text
            for (let y = 0; y < textCanvas.height; y += step) {
                for (let x = 0; x < textCanvas.width; x += step) {
                    const alpha = data[(y * textCanvas.width + x) * 4 + 3];
                    if (alpha > 128) {
                        const tx = (x - textCanvas.width / 2) * (TEXT_SIZE / 100);
                        const ty = -(y - textCanvas.height / 2) * (TEXT_SIZE / 100);
                        const tz = (Math.random() - 0.5) * 1.5; // Reduced depth variation
                        
                        textCoords.push({ x: tx, y: ty, z: tz });
                    }
                }
            }

            let coordIndex = 0;
            const totalCoords = textCoords.length;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                
                if (coordIndex < totalCoords) {
                    const target = textCoords[coordIndex];
                    particleTargets[i3] = target.x;
                    particleTargets[i3 + 1] = target.y;
                    particleTargets[i3 + 2] = target.z;
                    
                    coordIndex++;
                    if (coordIndex >= totalCoords) coordIndex = 0; 
                } else {
                    const scatterRange = 15;
                    particleTargets[i3] = (Math.random() - 0.5) * scatterRange;
                    particleTargets[i3 + 1] = (Math.random() - 0.5) * scatterRange;
                    particleTargets[i3 + 2] = (Math.random() - 0.5) * scatterRange;
                }
            }
        }

        function resetToSphere() {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                const spherePos = getSpherePoint();
                particleTargets[i3] = spherePos.x;
                particleTargets[i3 + 1] = spherePos.y;
                particleTargets[i3 + 2] = spherePos.z;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // Right-click drag handlers
        function onMouseDown(event) {
            if (event.button === 2) { // Right click
                isDragging = true;
                previousMousePosition = {
                    x: event.clientX,
                    y: event.clientY
                };
            }
        }

        function onMouseMove(event) {
            if (isDragging) {
                const deltaX = event.clientX - previousMousePosition.x;
                const deltaY = event.clientY - previousMousePosition.y;
                
                // Update rotation velocity based on drag
                rotationVelocity.y = deltaX * 0.005;
                rotationVelocity.x = deltaY * 0.005;
                
                previousMousePosition = {
                    x: event.clientX,
                    y: event.clientY
                };
            }
            
            // Subtle hover effect when not dragging
            if (!isDragging) {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function animate() {
            requestAnimationFrame(animate);

            const time = Date.now() * 0.0005;

            // Apply rotation from drag with inertia
            particles.rotation.y += rotationVelocity.y;
            particles.rotation.x += rotationVelocity.x;
            
            // Decay rotation velocity (inertia/friction)
            rotationVelocity.x *= 0.95;
            rotationVelocity.y *= 0.95;

            // Stop rotation when velocity is very small
            if (Math.abs(rotationVelocity.x) < 0.0001) rotationVelocity.x = 0;
            if (Math.abs(rotationVelocity.y) < 0.0001) rotationVelocity.y = 0;

            const positions = particles.geometry.attributes.position.array;
            
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                
                let px = positions[i3];
                let py = positions[i3 + 1];
                let pz = positions[i3 + 2];

                let tx = particleTargets[i3];
                let ty = particleTargets[i3 + 1];
                let tz = particleTargets[i3 + 2];

                const ease = 0.08; // Slightly faster for snappier text formation
                
                // Reduced jitter for clearer text visibility
                const jitter = Math.sin(time * 5 + i) * 0.01; // Reduced from 0.02

                px += (tx - px) * ease;
                py += (ty - py) * ease;
                pz += (tz - pz) * ease;

                // Minimal organic movement for "alive" feeling without blurring text
                positions[i3] = px + Math.sin(time * 0.5 + i * 0.1) * 0.02;
                positions[i3 + 1] = py + Math.cos(time * 0.5 + i * 0.1) * 0.02;
                positions[i3 + 2] = pz + jitter;
            }

            particles.geometry.attributes.position.needsUpdate = true;

            composer.render();
        }
    </script>
</body>
</html>
